<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAKino - Медіаплеєр</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background-color: #1a1a1a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e50914;
            margin-bottom: 20px;
        }
        .menu-item {
            padding: 12px 15px;
            background-color: #242424;
            color: #bbb;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            border: none;
            font-size: 16px;
        }
        .menu-item:focus, .menu-item.selected {
            background-color: #e50914;
            color: #fff;
            outline: none;
        }
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #242424;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:focus, .card:hover {
            transform: scale(1.05);
            outline: 2px solid #e50914;
        }
        .card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
        }
        .card-info {
            padding: 10px;
        }
        .card-title {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">📺 UAKino Player</div>
        <button class="menu-item selected" onclick="loadCategory('Головна')">🏠 Головна</button>
        <button class="menu-item" onclick="loadCategory('Фільми')">🎬 Фільми</button>
        <button class="menu-item" onclick="loadCategory('Серіали')">🍿 Серіали</button>
        <button class="menu-item" onclick="openUaWebsite()">🌐 Відкрити сайт</button>
    </div>

    <div class="content">
        <h1>Новинки</h1>
        <br>
        <div class="card-grid" id="movies-container">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
